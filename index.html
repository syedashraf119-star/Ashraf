<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Syed Ashraf — Portfolio</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#07080a;--dark:#0e1014;--accent:#4a9eff;--accent2:#7ec8e3;--white:#fff;--gray:#888899;--border:rgba(255,255,255,0.07)}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--white);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--accent)}

/* PAGE SYSTEM */
.page{display:none;min-height:100vh}
.page.active{display:block}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:999;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;background:rgba(7,8,10,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{font-size:0.85rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;color:#fff}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{color:var(--gray);text-decoration:none;font-size:0.73rem;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.2s}
.nav-links a:hover{color:#fff}
.nav-cta{background:var(--accent);color:#000;padding:0.4rem 1.1rem;font-size:0.7rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none}
.nav-back-btn{display:none;align-items:center;gap:0.5rem;color:var(--gray);font-size:0.73rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;background:none;border:none;transition:color 0.2s}
.nav-back-btn:hover{color:#fff}
.nav-back-btn.show{display:flex}

/* HERO */
.hero{position:relative;height:100vh;min-height:600px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:#07080a}
.hero-bg::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(74,158,255,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(74,158,255,0.07) 1px,transparent 1px);background-size:40px 40px}
.hero-bg::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(74,158,255,0.15) 1px,transparent 1px),linear-gradient(90deg,rgba(74,158,255,0.15) 1px,transparent 1px);background-size:200px 200px}
.hero-plan{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0.18}
.hero-fade{position:absolute;inset:0;background:radial-gradient(ellipse 60% 70% at 50% 50%,transparent 30%,rgba(7,8,10,0.9) 100%),linear-gradient(to bottom,rgba(7,8,10,0.5) 0%,transparent 20%,transparent 70%,rgba(7,8,10,1) 100%)}
.hero-glow{position:absolute;width:600px;height:400px;top:50%;left:50%;transform:translate(-50%,-50%);background:radial-gradient(ellipse,rgba(74,158,255,0.08) 0%,transparent 70%);pointer-events:none}
.hero-content{position:relative;z-index:2;max-width:800px;padding:0 1.5rem}
.hero-badge{display:inline-flex;align-items:center;gap:0.6rem;border:1px solid rgba(74,158,255,0.4);padding:0.3rem 1rem;margin-bottom:2rem;font-size:0.66rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);opacity:0;animation:fadeUp 0.8s 0.2s forwards}
.hero-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.hero-name{font-size:clamp(4rem,13vw,9rem);font-weight:700;line-height:0.9;letter-spacing:-0.04em;opacity:0;animation:fadeUp 0.8s 0.4s forwards}
.hero-name span{display:block;background:linear-gradient(160deg,#fff 20%,#a8d4f0 55%,#4a9eff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-role{margin:1.8rem 0;opacity:0;animation:fadeUp 0.8s 0.6s forwards}
.hero-role span{color:var(--gray);font-size:0.78rem;letter-spacing:0.18em;text-transform:uppercase;border-top:1px solid rgba(74,158,255,0.2);border-bottom:1px solid rgba(74,158,255,0.2);padding:0.5rem 1.5rem}
.hero-pills{display:flex;flex-wrap:wrap;gap:0.5rem;justify-content:center;margin-bottom:2.5rem;opacity:0;animation:fadeUp 0.8s 0.8s forwards}
.hero-pill{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);padding:0.3rem 0.9rem;font-size:0.72rem;letter-spacing:0.06em;color:rgba(255,255,255,0.55)}
.hero-btns{display:flex;gap:0.8rem;justify-content:center;opacity:0;animation:fadeUp 0.8s 1s forwards;flex-wrap:wrap}
.btn-p{background:var(--accent);color:#000;padding:0.75rem 2rem;font-size:0.75rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;transition:all 0.2s;display:inline-block}
.btn-p:hover{background:var(--accent2);transform:translateY(-2px)}
.btn-g{border:1px solid rgba(255,255,255,0.15);color:#fff;padding:0.75rem 2rem;font-size:0.75rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;transition:all 0.2s;display:inline-block}
.btn-g:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}
.scroll-hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:0.5rem;color:var(--gray);font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;opacity:0;animation:fadeUp 0.8s 1.4s forwards}
.scroll-bar{width:1px;height:40px;background:linear-gradient(to bottom,var(--accent),transparent);animation:sb 1.5s ease-in-out infinite}
@keyframes sb{0%{transform:scaleY(0);transform-origin:top}50%{transform:scaleY(1);transform-origin:top}51%{transform:scaleY(1);transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom}}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

/* HEADLINE */
.hl{height:70vh;display:flex;align-items:center;justify-content:center;background:var(--black);position:relative;overflow:hidden}
.hl::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(74,158,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(74,158,255,0.04) 1px,transparent 1px);background-size:50px 50px}
.hl-inner{position:relative;z-index:1;text-align:center;padding:0 2rem;max-width:900px}
.hl-words{font-size:clamp(2.2rem,6vw,5.5rem);font-weight:700;line-height:1.1;letter-spacing:-0.03em}
.w{display:inline;color:rgba(255,255,255,0.1);transition:color 0.45s,text-shadow 0.45s}
.w.on{color:#fff;text-shadow:0 0 60px rgba(74,158,255,0.2)}
.w.ac.on{background:linear-gradient(135deg,#7ec8e3,#4a9eff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none}
.hl-sub{margin-top:1.2rem;font-size:0.88rem;color:var(--gray);letter-spacing:0.08em;opacity:0;transition:opacity 0.8s 0.2s}
.hl-sub.on{opacity:1}

/* COMMON SECTIONS */
.sec{padding:6rem 0}
.wrap{max-width:1060px;margin:0 auto;padding:0 2rem}
.ey{font-size:0.66rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--accent);margin-bottom:0.6rem;display:flex;align-items:center;gap:0.6rem}
.ey::before{content:'';width:22px;height:1px;background:var(--accent)}
.st{font-size:clamp(1.7rem,4vw,2.8rem);font-weight:700;letter-spacing:-0.02em;line-height:1.1;margin-bottom:2.5rem}
.st b{color:var(--accent)}

/* PROJECT GRID */
.proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:rgba(255,255,255,0.04);margin-top:2.5rem}
.pc{position:relative;overflow:hidden;aspect-ratio:4/3;cursor:pointer;display:block;border:none;background:none;width:100%;padding:0}
.pc.wide{grid-column:span 2;aspect-ratio:16/7}
.pi{width:100%;height:100%;object-fit:cover;filter:grayscale(50%) brightness(0.5);transition:all 0.5s;display:block}
.pc:hover .pi{filter:grayscale(0%) brightness(0.75);transform:scale(1.04)}
.pp{width:100%;height:100%;background:linear-gradient(135deg,#0d1b2a,#1a3a5c);display:flex;align-items:center;justify-content:center;font-size:4rem;font-weight:700;color:rgba(74,158,255,0.08)}
.po{position:absolute;inset:0;background:linear-gradient(to top,rgba(7,8,10,0.97) 0%,rgba(7,8,10,0.1) 55%,transparent 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:1.5rem;text-align:left}
.pn{font-size:0.6rem;letter-spacing:0.2em;color:var(--accent);text-transform:uppercase;margin-bottom:0.3rem}
.pt{font-size:1rem;font-weight:600;margin-bottom:0.3rem;line-height:1.3;color:#fff}
.pd{font-size:0.76rem;color:var(--gray);line-height:1.5;margin-bottom:0.6rem}
.pcs{display:flex;flex-wrap:wrap;gap:0.3rem}
.ch{font-size:0.6rem;padding:2px 7px;border:1px solid rgba(74,158,255,0.2);color:var(--accent2);letter-spacing:0.06em;text-transform:uppercase}
.wb{display:inline-block;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.25);color:#fbbf24;font-size:0.6rem;padding:2px 7px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.3rem}
.pc-hint{position:absolute;top:1rem;right:1rem;background:rgba(74,158,255,0.9);color:#000;font-size:0.6rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:0.3rem 0.7rem;opacity:0;transition:opacity 0.3s}
.pc:hover .pc-hint{opacity:1}

/* QS SECTION */
.qs-layout{display:grid;grid-template-columns:1.1fr 1fr;gap:4rem;align-items:center}
.qs-img{position:relative;border:1px solid rgba(74,158,255,0.12);overflow:hidden}
.qs-img img{width:100%;display:block;filter:brightness(0.85)}
.qs-cap{position:absolute;bottom:0;left:0;right:0;background:rgba(7,8,10,0.9);padding:0.6rem 1rem;font-size:0.68rem;color:var(--gray);border-top:1px solid rgba(74,158,255,0.1)}
.qs-t h2{font-size:clamp(1.5rem,3vw,2.3rem);font-weight:700;letter-spacing:-0.02em;line-height:1.15;margin:0.5rem 0 1rem}
.qs-t p{color:var(--gray);font-size:0.86rem;line-height:1.8;margin-bottom:1.5rem}
.qs-rows{display:flex;flex-direction:column;gap:0.5rem}
.qr{display:flex;gap:0.8rem;align-items:flex-start;padding:0.85rem;border:1px solid var(--border);background:rgba(255,255,255,0.02)}
.qd{width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px}
.qr h4{font-size:0.8rem;font-weight:600;margin-bottom:2px}
.qr p{font-size:0.73rem;color:var(--gray);line-height:1.5}

/* SKILLS */
.sk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);margin-top:2.5rem}
.sk{background:var(--black);padding:1.6rem 1.3rem;transition:background 0.3s}
.sk:hover{background:rgba(74,158,255,0.04)}
.sk-i{font-size:1.2rem;margin-bottom:0.6rem}
.sk-n{font-size:0.82rem;font-weight:600;margin-bottom:0.2rem}
.sk-d{font-size:0.7rem;color:var(--gray);line-height:1.5}

/* ABOUT */
.about-sec{background:var(--dark);position:relative;overflow:hidden}
.about-sec::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(74,158,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(74,158,255,0.025) 1px,transparent 1px);background-size:50px 50px}
.ab-layout{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center;position:relative;z-index:1}
.ab-text p{color:var(--gray);font-size:0.86rem;line-height:1.85;margin-bottom:1rem}
.ab-open{color:var(--accent);font-size:0.78rem;letter-spacing:0.06em;margin-top:1.5rem;display:flex;align-items:center;gap:0.5rem}
.ab-open::before{content:'';width:18px;height:1px;background:var(--accent)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.sc{background:var(--dark);padding:2.2rem 1.8rem;text-align:center}
.sn{font-size:3rem;font-weight:700;background:linear-gradient(135deg,#fff,#4a9eff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
.sl{font-size:0.62rem;color:var(--gray);letter-spacing:0.12em;text-transform:uppercase;margin-top:0.4rem}

/* EDUCATION */
.edu-rows{margin-top:2rem}
.er{display:grid;grid-template-columns:90px 1fr;gap:1.5rem;padding:1.3rem 0;border-bottom:1px solid var(--border);align-items:start}
.eyr{font-size:0.7rem;color:var(--accent);letter-spacing:0.08em;padding-top:3px}
.et{font-size:0.92rem;font-weight:600;margin-bottom:2px}
.ep{font-size:0.78rem;color:var(--gray)}
.certs{display:flex;flex-wrap:wrap;gap:0.5rem;margin-top:2rem}
.cert{border:1px solid rgba(74,158,255,0.18);background:rgba(74,158,255,0.04);padding:0.4rem 0.9rem;font-size:0.7rem;color:var(--accent2);letter-spacing:0.06em}

/* CONTACT */
.ct-sec{background:var(--dark);padding:8rem 0;text-align:center;position:relative;overflow:hidden}
.ct-sec::before{content:'CONTACT';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18vw;font-weight:700;color:rgba(255,255,255,0.012);letter-spacing:-0.05em;white-space:nowrap;pointer-events:none}
.ct-wrap{position:relative;z-index:1;max-width:460px;margin:0 auto;padding:0 1.5rem}
.ct-h{font-size:clamp(2.2rem,6vw,4.5rem);font-weight:700;letter-spacing:-0.03em;line-height:1;margin-bottom:0.8rem}
.ct-p{color:var(--gray);margin-bottom:2.5rem;font-size:0.88rem}
.ct-list{display:flex;flex-direction:column;gap:1px;background:var(--border)}
.cl{background:var(--dark);display:flex;align-items:center;justify-content:space-between;padding:1.1rem 1.3rem;text-decoration:none;color:#fff;transition:background 0.25s}
.cl:hover{background:rgba(74,158,255,0.07)}
.cl-left{display:flex;flex-direction:column;gap:2px;text-align:left}
.cl-lbl{font-size:0.58rem;color:var(--accent);letter-spacing:0.18em;text-transform:uppercase}
.cl-val{font-size:0.86rem;font-weight:500}
.cl-arr{color:var(--accent);font-size:1rem;transition:transform 0.2s}
.cl:hover .cl-arr{transform:translateX(4px)}
footer{border-top:1px solid var(--border);padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;font-size:0.66rem;color:var(--gray);letter-spacing:0.08em}

/* PROJECT DETAIL PAGE */
.proj-detail{padding-top:80px}
.proj-detail-hero{width:100%;height:55vh;min-height:300px;object-fit:cover;display:block;filter:brightness(0.85)}
.proj-detail-body{max-width:1060px;margin:0 auto;padding:3rem 2rem}
.proj-eyebrow{font-size:0.66rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--accent);margin-bottom:0.6rem;display:flex;align-items:center;gap:0.6rem}
.proj-eyebrow::before{content:'';width:22px;height:1px;background:var(--accent)}
.proj-big-title{font-size:clamp(1.8rem,5vw,3.5rem);font-weight:700;letter-spacing:-0.02em;line-height:1.1;margin-bottom:1rem}
.proj-big-title b{color:var(--accent)}
.proj-desc-text{color:var(--gray);font-size:0.92rem;line-height:1.8;max-width:700px;margin-bottom:2rem}
.proj-chips{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:2.5rem}
.specs{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;background:var(--border);margin-bottom:3rem}
.spec{background:var(--dark);padding:1.2rem}
.spec-lbl{font-size:0.6rem;color:var(--accent);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:0.3rem}
.spec-val{font-size:0.92rem;font-weight:600}
.drawing-section{margin-bottom:3rem}
.drawing-title{font-size:0.66rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;display:flex;align-items:center;gap:0.6rem;padding-bottom:0.8rem;border-bottom:1px solid var(--border)}
.drawing-title::before{content:'';width:22px;height:1px;background:var(--accent)}
.pdf-frame{width:100%;height:75vh;min-height:450px;border:1px solid var(--border);display:block;background:#fff}
.pdf-tip{font-size:0.7rem;color:var(--gray);margin-top:0.5rem;letter-spacing:0.04em}
.proj-nav{display:flex;justify-content:space-between;gap:1rem;padding-top:2rem;border-top:1px solid var(--border);margin-top:1rem}
.proj-nav-btn{background:none;border:1px solid var(--border);color:var(--gray);padding:0.7rem 1.4rem;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:0.5rem}
.proj-nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.proj-nav-btn:disabled{opacity:0.2;cursor:default}
.planswift-img{width:100%;border:1px solid var(--border);filter:brightness(0.85);display:block;margin-bottom:0.5rem}

/* REVEAL */
.rv{opacity:0;transform:translateY(26px);transition:opacity 0.7s,transform 0.7s}
.rv.in{opacity:1;transform:translateY(0)}
.rv-l{opacity:0;transform:translateX(-26px);transition:opacity 0.7s,transform 0.7s}
.rv-l.in{opacity:1;transform:translateX(0)}
.rv-r{opacity:0;transform:translateX(26px);transition:opacity 0.7s,transform 0.7s}
.rv-r.in{opacity:1;transform:translateX(0)}

@media(max-width:768px){
  nav{padding:0 1rem}.nav-links{display:none}
  .wrap{padding:0 1rem}
  .proj-grid{grid-template-columns:1fr}.pc.wide{grid-column:span 1;aspect-ratio:4/3}
  .qs-layout,.ab-layout{grid-template-columns:1fr;gap:2.5rem}
  .sk-grid{grid-template-columns:1fr 1fr}
  .er{grid-template-columns:70px 1fr}
  footer{flex-direction:column;gap:0.4rem;text-align:center}
  .proj-detail-hero{height:35vh}
  .pdf-frame{height:50vh}
}
</style>
</head>

<nav>
  <div class="nav-logo" onclick="showHome()">Syed Ashraf</div>

</nav>
